<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>黎曼可积积分出题器</title>
    <link rel="stylesheet" href="./styles.css" />
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [["\\(", "\\)"], ["$", "$"]],
          displayMath: [["\\[", "\\]"]]
        },
        svg: {
          fontCache: "global"
        }
      };
    </script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"
    ></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <p class="eyebrow">Integral Workshop</p>
        <h1>黎曼可积的定积分 / 不定积分出题器</h1>
        <p class="hero-copy">
          每次随机抽一道带有显式初等函数解的题目。程序会先把题目发给模型做一次解析法手算，再把我预先写好的传统法、技巧法与模型反馈一起隐藏起来，等你点击按钮后统一展开。
        </p>
      </section>

      <section class="control-panel">
        <form id="mode-form" class="mode-form">
          <label class="mode-option">
            <input type="radio" name="mode" value="indefinite" checked />
            <span>不定积分</span>
          </label>
          <label class="mode-option">
            <input type="radio" name="mode" value="definite" />
            <span>定积分</span>
          </label>
          <button id="generate-button" class="primary-button" type="submit">
            换一道题
          </button>
        </form>

        <p id="status" class="status" role="status" aria-live="polite">
          正在准备第一道题。
        </p>
      </section>

      <section class="problem-card" aria-labelledby="problem-title">
        <div class="problem-meta">
          <span id="problem-type" class="problem-type">不定积分</span>
          <ul id="problem-tags" class="tag-list"></ul>
        </div>

        <h2 id="problem-title">题目载入中</h2>
        <div id="problem-statement" class="statement"></div>
        <p id="problem-rationale" class="rationale"></p>

        <button id="reveal-button" class="secondary-button" type="button" disabled>
          展示答案
        </button>
      </section>

      <section id="answer-panel" class="answer-panel" hidden>
        <article class="answer-block">
          <h3>最终结果</h3>
          <div id="final-answer" class="statement"></div>
        </article>

        <article class="answer-block">
          <h3>传统方法</h3>
          <ol id="traditional-method" class="solution-list"></ol>
        </article>

        <article class="answer-block">
          <h3>技巧方法</h3>
          <ol id="clever-method" class="solution-list"></ol>
        </article>

        <article class="answer-block">
          <h3>发给模型的提示词</h3>
          <pre id="model-prompt" class="code-panel"></pre>
        </article>

        <article class="answer-block">
          <h3>模型返回</h3>
          <pre id="model-feedback" class="code-panel"></pre>
        </article>
      </section>
    </main>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
